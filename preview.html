<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SLS PRO BROADCAST - LIVE OVERLAY</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&family=Barlow+Condensed:wght@700;900&family=JetBrains+Mono:wght@700&display=swap');
        
        :root { --sls-gold: #d4af37; --sls-red: #ff3e3e; }

        body { 
            font-family: 'Barlow Condensed', sans-serif; 
            background-color: #050505; 
            color: white;
            text-transform: uppercase;
            overflow: hidden;
        }

        .font-mono { font-family: 'JetBrains Mono', monospace; }

        /* Leaderboard Animations */
        .rank-row {
            background: linear-gradient(90deg, #0a0a0a 0%, #050505 100%);
            border-left: 4px solid transparent;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .rank-row-top { border-left-color: var(--sls-gold); background: #111; }

        /* Timer Progress Bar */
        .timer-bar {
            height: 4px;
            background: var(--sls-gold);
            transition: width 1s linear;
            box-shadow: 0 0 15px var(--sls-gold);
        }
        .timer-critical { color: var(--sls-red); text-shadow: 0 0 30px rgba(255, 62, 62, 0.5); }
        .timer-bar-critical { background: var(--sls-red); box-shadow: 0 0 15px var(--sls-red); }

        /* Smooth Table Transitions */
        tbody tr { animation: fadeIn 0.5s ease forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="h-screen flex flex-col">

    <div class="bg-black border-b-4 border-[#d4af37] px-10 py-5 flex justify-between items-center shadow-2xl z-10">
        <div class="flex items-center gap-8">
            <div class="bg-white text-black px-5 py-1 font-black text-3xl italic tracking-tighter">SKATE</div>
            <div>
                <h1 id="currentClassDisplay" class="text-4xl font-black italic leading-none tracking-tighter">76 JELEK</h1>
                <p class="text-[10px] text-[#d4af37] font-bold tracking-[0.5em] mt-1 italic">LIVE SCORE</p>
            </div>
        </div>
        
        <div id="eventStatus" class="flex items-center gap-4 text-zinc-500 font-bold text-xs tracking-widest">
            <span class="flex h-2 w-2 rounded-full bg-emerald-500"></span>
            DATABASE SYNC ACTIVE
        </div>
    </div>

    <div class="flex flex-grow overflow-hidden">
        
        <div class="w-8/12 p-10 overflow-y-auto">
            <table class="w-full border-separate border-spacing-y-3">
                <thead>
                    <tr class="text-zinc-600 text-[10px] font-bold tracking-[0.4em]">
                        <th class="px-4 py-2 text-center w-24">RANKING</th>
                        <th class="px-4 py-2 text-left">ATHLETE NAME</th>
                        <th class="px-4 py-2 text-center">RUN 1</th>
                        <th class="px-4 py-2 text-center">RUN 2</th>
                        <th class="px-4 py-2 text-right">BEST SCORE</th>
                    </tr>
                </thead>
                <tbody id="rankTable"></tbody>
            </table>
        </div>

        <div class="w-4/12 bg-zinc-950 border-l border-zinc-900 flex flex-col">
            
            <div class="p-12 border-b border-zinc-900 bg-gradient-to-b from-zinc-900/40 to-transparent">
                <div class="flex justify-between items-center mb-2">
                    <span class="text-[#d4af37] text-[10px] font-bold tracking-[0.4em]">RUN CLOCK</span>
                    <span id="timerStatus" class="text-[9px] text-zinc-500">REMOTE CONTROLLED</span>
                </div>
                <div id="timerDisplay" class="text-[130px] font-mono font-bold leading-none tracking-tighter text-white">
                    00:45
                </div>
                <div class="w-full bg-zinc-800 h-1 mt-4 overflow-hidden rounded-full">
                    <div id="timerBar" class="timer-bar" style="width: 100%;"></div>
                </div>
            </div>

            <div class="p-12 flex-grow flex flex-col">
                <div id="nextSkaterInfo" class="mb-10">
                    </div>

                <div class="mt-auto">
                    <div class="grid grid-cols-2 gap-4 mb-8">
                        <div class="bg-zinc-900/50 p-4 border border-zinc-800 rounded">
                            <p class="text-[9px] text-zinc-500 mb-1">HIGHEST RUN</p>
                            <p id="highestRun" class="text-2xl font-bold italic">0.0</p>
                        </div>
                        <div class="bg-zinc-900/50 p-4 border border-zinc-800 rounded">
                            <p class="text-[9px] text-zinc-500 mb-1">TOTAL RIDERS</p>
                            <p id="totalRiders" class="text-2xl font-bold italic">0</p>
                        </div>
                    </div>

                    <div class="border-t-2 border-[#d4af37] pt-6">
                        <div class="text-[#d4af37] text-[11px] font-bold tracking-[0.4em] mb-2 italic">REQUIRED FOR 1ST</div>
                        <div id="targetToLead" class="text-8xl font-black italic leading-none text-white tracking-tighter">
                            0.0
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="p-6 bg-black border-t border-zinc-900 flex flex-col gap-1">
                <div id="activityFeed" class="text-[9px] text-emerald-500/70 font-bold tracking-widest italic animate-pulse">
                    READY FOR NEXT DROP...
                </div>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://ozvuclwfyehtuywioner.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im96dnVjbHdmeWVodHV5d2lvbmVyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY2OTE1MjcsImV4cCI6MjA5MjI2NzUyN30.H1t75CTSEXb5s_BnCRKEnWCyBM7sFVJeQVKJu4vPHww';
        const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let activeCategory = 'Beginner';
        let timeLeft = 45;
        let timerRunning = false;

        async function fetchData() {
            try {
                const { data: riders } = await db.from('participants').select('*').eq('category', activeCategory);
                const { data: scores } = await db.from('scores').select('*');

                const riderScores = {};
                scores.forEach(s => {
                    if (!riderScores[s.participant_id]) riderScores[s.participant_id] = [];
                    riderScores[s.participant_id].push(s.score);
                });

                const sorted = riders.map(r => {
                    const runs = riderScores[r.id] || [];
                    return { ...r, r1: runs[0] || 0, r2: runs[1] || 0, best: Math.max(...runs, 0) };
                }).sort((a, b) => b.best - a.best);

                document.getElementById('totalRiders').innerText = riders.length;
                document.getElementById('highestRun').innerText = sorted[0]?.best.toFixed(1) || "0.0";

                renderTable(sorted);
                
                const alphabetical = [...riders].sort((a, b) => a.name.localeCompare(b.name));
                const allDoneR1 = alphabetical.every(r => (riderScores[r.id]?.length || 0) >= 1);
                const currentRun = allDoneR1 ? 2 : 1;
                const nextSkater = alphabetical.find(r => (riderScores[r.id]?.length || 0) < currentRun);
                
                renderActivePanel(nextSkater, currentRun, sorted[0]?.best || 0);
            } catch (err) { console.error(err); }
        }

        function renderTable(data) {
            const tbody = document.getElementById('rankTable');
            tbody.innerHTML = data.map((r, i) => `
                <tr class="rank-row ${i === 0 ? 'rank-row-top' : ''}">
                    <td class="px-6 py-6 text-center font-oswald text-2xl ${i === 0 ? 'text-[#d4af37]' : 'text-zinc-800'}">0${i + 1}</td>
                    <td class="px-6 py-6">
                        <div class="text-3xl font-black italic tracking-tighter leading-none">${r.name}</div>
                        <div class="text-[9px] text-zinc-600 font-bold tracking-[0.4em] mt-1">PRO ATHLETE</div>
                    </td>
                    <td class="px-4 py-6 text-center font-mono text-xl text-zinc-500">${r.r1 > 0 ? r.r1.toFixed(1) : '<span class="opacity-10">-</span>'}</td>
                    <td class="px-4 py-6 text-center font-mono text-xl text-zinc-500">${r.r2 > 0 ? r.r2.toFixed(1) : '<span class="opacity-10">-</span>'}</td>
                    <td class="px-6 py-6 text-right font-oswald">
                        <span class="text-4xl font-black italic ${i === 0 ? 'text-[#d4af37]' : 'text-white'}">${r.best.toFixed(1)}</span>
                    </td>
                </tr>
            `).join('');
        }

        function renderActivePanel(rider, runNum, topScore) {
            const info = document.getElementById('nextSkaterInfo');
            const target = document.getElementById('targetToLead');
            const feed = document.getElementById('activityFeed');

            if (!rider) {
                info.innerHTML = `<h2 class="text-4xl font-black italic text-zinc-700">SESSION ENDED</h2>`;
                target.innerText = "0.0";
                return;
            }

            info.innerHTML = `
                <div class="text-[#d4af37] text-[11px] font-bold tracking-[0.5em] mb-4">ON DECK / RUN ${runNum}</div>
                <h2 class="text-8xl font-black italic leading-none tracking-tighter">${rider.name}</h2>
                <div class="mt-6 flex items-center gap-3">
                    <span class="bg-emerald-500 text-black px-3 py-0.5 text-[9px] font-black">ACTIVE</span>
                    <span class="text-[9px] font-bold text-zinc-500 tracking-widest uppercase">Waiting for drop in...</span>
                </div>
            `;
            target.innerText = (topScore + 0.1).toFixed(1);
            feed.innerText = `LATEST: ${rider.name.toUpperCase()} IS READY FOR RUN ${runNum}`;
        }

        // Timer Sync Logic (Placeholder: Sesuaikan dengan kolom 'timer' di DB kamu nanti)
        function updateTimerUI() {
            const mins = Math.floor(timeLeft / 60);
            const secs = timeLeft % 60;
            const display = document.getElementById('timerDisplay');
            const bar = document.getElementById('timerBar');
            
            display.innerText = `0${mins}:${secs < 10 ? '0' : ''}${secs}`;
            bar.style.width = `${(timeLeft / 45) * 100}%`;

            if (timeLeft <= 10) {
                display.classList.add('timer-critical');
                bar.classList.add('timer-bar-critical');
            } else {
                display.classList.remove('timer-critical');
                bar.classList.remove('timer-bar-critical');
            }
        }

        function switchTab(cat) {
            activeCategory = cat;
            document.getElementById('currentClassDisplay').innerText = `WORLD TOUR: ${cat.toUpperCase()}`;
            fetchData();
        }

        db.channel('any').on('postgres_changes', { event: '*', schema: 'public', table: '*' }, fetchData).subscribe();
        document.addEventListener('DOMContentLoaded', () => {
            fetchData();
            updateTimerUI();
        });
    </script>
</body>
</html>
