<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Rank - Professional Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=JetBrains+Mono:wght@700&display=swap');
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #050505; 
            color: #e2e8f0; 
        }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
        
        tr { transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1); }
        
        .glass-header { 
            background: rgba(10, 10, 10, 0.8); 
            backdrop-filter: blur(12px); 
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
        }

        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: #050505; }
        ::-webkit-scrollbar-thumb { background: #222; border-radius: 10px; }

        @keyframes pulse-soft {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.8; transform: scale(0.98); }
        }
        .animate-next { animation: pulse-soft 3s infinite ease-in-out; }
    </style>
</head>
<body class="overflow-hidden h-screen flex flex-col">

    <div class="glass-header p-6 flex justify-between items-center z-10">
        <div>
            <h1 class="text-3xl font-black italic tracking-tighter text-white">
                SKATE<span class="text-zinc-500 underline decoration-white/20">LIVE</span>RANK
            </h1>
            <div id="statusInfo" class="text-[9px] uppercase tracking-[0.4em] text-zinc-500 font-bold mt-1 flex items-center gap-2">
                <span class="w-1.5 h-1.5 rounded-full bg-green-500 animate-pulse"></span>
                System Live: Round Robin Mode
            </div>
        </div>
        
        <div class="flex gap-2 bg-zinc-900/50 p-1.5 rounded-2xl border border-white/5">
            <button onclick="switchTab('Beginner')" id="tabBeginner" class="px-8 py-2.5 rounded-xl text-[10px] font-black transition-all bg-white text-black shadow-xl shadow-white/5">BEGINNER</button>
            <button onclick="switchTab('Open')" id="tabOpen" class="px-8 py-2.5 rounded-xl text-[10px] font-black transition-all text-zinc-500 hover:text-white">OPEN</button>
            <button onclick="switchTab('Grooms')" id="tabGrooms" class="px-8 py-2.5 rounded-xl text-[10px] font-black transition-all text-zinc-500 hover:text-white">GROOMS</button>
        </div>
    </div>

    <div class="flex-grow p-6 overflow-y-auto">
        <table class="w-full text-left border-separate border-spacing-y-3">
            <thead>
                <tr class="text-zinc-600 uppercase text-[9px] font-black tracking-[0.3em]">
                    <th class="px-6 py-2 w-20 text-center">Rank</th>
                    <th class="px-6 py-2">Athlete Name</th>
                    <th class="px-4 py-2 text-center">Run 1</th>
                    <th class="px-4 py-2 text-center">Run 2</th>
                    <th class="px-6 py-2 text-right">Best Score</th>
                </tr>
            </thead>
            <tbody id="rankTable"></tbody>
        </table>
    </div>

    <div class="fixed bottom-10 right-10 z-20" id="nextSkaterContainer"></div>

    <script>
        const SUPABASE_URL = 'https://ozvuclwfyehtuywioner.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im96dnVjbHdmeWVodHV5d2lvbmVyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY2OTE1MjcsImV4cCI6MjA5MjI2NzUyN30.H1t75CTSEXb5s_BnCRKEnWCyBM7sFVJeQVKJu4vPHww';
        const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let activeCategory = 'Beginner';

        function switchTab(cat) {
            activeCategory = cat;
            document.querySelectorAll('button[id^="tab"]').forEach(b => {
                b.classList.remove('bg-white', 'text-black');
                b.classList.add('text-zinc-500');
            });
            const activeBtn = document.getElementById('tab' + cat);
            activeBtn.classList.add('bg-white', 'text-black');
            activeBtn.classList.remove('text-zinc-500');
            fetchData();
        }

        async function fetchData() {
            try {
                const { data: riders } = await db.from('participants').select('*').eq('category', activeCategory);
                const { data: scores } = await db.from('scores').select('*');

                const riderScores = {};
                scores.forEach(s => {
                    if (!riderScores[s.participant_id]) riderScores[s.participant_id] = [];
                    riderScores[s.participant_id].push(s.score);
                });

                // 1. Leaderboard: Urut Berdasarkan Skor Terbaik
                const leaderboardData = riders.map(r => {
                    const runs = riderScores[r.id] || [];
                    const r1 = runs[0] || 0;
                    const r2 = runs[1] || 0;
                    const best = Math.max(r1, r2);
                    return { ...r, r1, r2, best };
                }).sort((a, b) => b.best - a.best);

                renderTable(leaderboardData);
                
                // 2. LOGIKA PERBAIKAN: Next Skater Urut ABJAD (Sesuai Juri)
                const alphabeticalRiders = [...riders].sort((a, b) => a.name.localeCompare(b.name));
                
                // Cek apakah semua sudah selesai Run 1?
                const allDoneRun1 = alphabeticalRiders.every(r => (riderScores[r.id]?.length || 0) >= 1);
                const currentGlobalRun = allDoneRun1 ? 2 : 1;

                // Cari atlet pertama (A-Z) yang belum melakukan run yang sedang berjalan
                const nextSkater = alphabeticalRiders.find(r => (riderScores[r.id]?.length || 0) < currentGlobalRun);
                
                renderNext(nextSkater, currentGlobalRun);

            } catch (err) { console.error("Sync Error:", err); }
        }

        function renderTable(data) {
            const tbody = document.getElementById('rankTable');
            tbody.innerHTML = data.map((r, i) => `
                <tr class="bg-zinc-900/30 border border-white/[0.02] hover:bg-zinc-900/60 transition-all">
                    <td class="px-6 py-6 text-center">
                        <span class="font-mono text-xs ${i < 3 ? 'text-white' : 'text-zinc-700'}">0${i + 1}</span>
                    </td>
                    <td class="px-6 py-6">
                        <div class="text-lg font-extrabold uppercase tracking-tight text-zinc-100">${r.name}</div>
                        <div class="text-[8px] text-zinc-600 font-bold uppercase tracking-widest mt-0.5">Qualified Athlete</div>
                    </td>
                    <td class="px-4 py-6 text-center font-mono text-zinc-500">
                        ${r.r1 > 0 ? r.r1.toFixed(1) : '<span class="opacity-20 text-[10px]">AWAITING</span>'}
                    </td>
                    <td class="px-4 py-6 text-center font-mono text-zinc-500">
                        ${r.r2 > 0 ? r.r2.toFixed(1) : '<span class="opacity-20 text-[10px]">AWAITING</span>'}
                    </td>
                    <td class="px-6 py-6 text-right border-l border-white/5">
                        <span class="text-2xl font-black text-white font-mono tracking-tighter italic">
                            ${r.best > 0 ? r.best.toFixed(2) : '0.00'}
                        </span>
                    </td>
                </tr>
            `).join('');
        }

        function renderNext(rider, runNumber) {
            const container = document.getElementById('nextSkaterContainer');
            if (!rider) {
                container.innerHTML = `
                    <div class="bg-zinc-900 p-6 rounded-3xl border border-white/10 shadow-2xl">
                        <p class="text-[9px] font-black text-zinc-500 uppercase tracking-[0.3em]">Status</p>
                        <h2 class="text-xl font-black italic text-white">ALL RUNS FINISHED</h2>
                    </div>`;
                return;
            }

            const isRun2 = runNumber === 2;
            container.innerHTML = `
                <div class="bg-white p-8 rounded-[2.5rem] shadow-[0_20px_50px_rgba(255,255,255,0.1)] border-b-8 border-zinc-200 animate-next">
                    <div class="flex items-center gap-3 mb-2">
                        <span class="px-3 py-1 rounded-full ${isRun2 ? 'bg-orange-100 text-orange-600' : 'bg-blue-100 text-blue-600'} text-[8px] font-black uppercase tracking-widest">
                            Ready for Run ${runNumber}
                        </span>
                    </div>
                    <h2 class="text-5xl font-black italic text-black uppercase tracking-tighter leading-none">${rider.name}</h2>
                    <p class="text-[10px] font-bold text-zinc-400 mt-3 uppercase tracking-widest">Next Skater up to deck</p>
                </div>
            `;
        }

        db.channel('preview_sync').on('postgres_changes', { event: '*', schema: 'public', table: 'scores' }, fetchData).subscribe();
        db.channel('rider_sync').on('postgres_changes', { event: '*', schema: 'public', table: 'participants' }, fetchData).subscribe();

        document.addEventListener('DOMContentLoaded', fetchData);
    </script>
</body>
</html>
