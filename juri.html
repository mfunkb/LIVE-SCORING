<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Juror Panel - Professional Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #050505; color: #fff; }
        .glass-card { background: rgba(15, 15, 15, 0.8); border: 1px solid rgba(255,255,255,0.05); }
    </style>
</head>
<body class="flex flex-col min-h-screen p-4 lg:p-10">

    <div id="loginSection" class="max-w-md mx-auto w-full glass-card p-10 rounded-[3rem] shadow-2xl">
        <h1 class="text-3xl font-black italic mb-8 tracking-tighter">OFFICIAL<br><span class="text-zinc-600">JUROR ACCESS</span></h1>
        <div class="space-y-4">
            <input type="text" id="username" placeholder="Username (juri1, juri2, juri3)" class="w-full bg-zinc-900 border border-zinc-800 p-4 rounded-2xl outline-none focus:border-white transition-all">
            <input type="password" id="password" placeholder="Password" class="w-full bg-zinc-900 border border-zinc-800 p-4 rounded-2xl outline-none focus:border-white transition-all">
            
            <label class="block text-[10px] font-black text-zinc-500 uppercase tracking-widest mt-4">Select Category to Judge</label>
            <select id="categorySelect" class="w-full bg-zinc-900 border border-zinc-800 p-4 rounded-2xl outline-none font-bold">
                <option value="Beginner">BEGINNER</option>
                <option value="Open">OPEN</option>
                <option value="Grooms">GROOMS</option>
            </select>

            <button onclick="login()" class="w-full bg-white text-black font-black py-4 rounded-2xl hover:bg-zinc-200 active:scale-95 transition-all mt-4">START SCORING</button>
        </div>
    </div>

    <div id="jurorPanel" class="hidden max-w-xl mx-auto w-full space-y-6">
        <header class="flex justify-between items-center bg-zinc-900/50 p-6 rounded-3xl border border-white/5">
            <div>
                <p id="displayUser" class="text-[9px] font-black text-zinc-500 uppercase tracking-[0.3em] italic"></p>
                <h2 id="displayCategory" class="text-xl font-black text-white italic tracking-tighter uppercase"></h2>
            </div>
            <button onclick="location.reload()" class="text-[10px] font-bold text-zinc-600 hover:text-white uppercase transition-all">Exit</button>
        </header>

        <div class="glass-card p-8 rounded-[2.5rem] shadow-2xl relative overflow-hidden">
            <div id="runIndicator" class="absolute top-6 right-8 px-4 py-1 rounded-full bg-blue-500/10 text-blue-500 text-[10px] font-black tracking-widest uppercase italic">
                Detecting Run...
            </div>

            <div class="mb-8">
                <label class="text-[10px] font-bold text-zinc-500 uppercase tracking-widest block mb-4 italic">Active Athlete</label>
                <select id="selectRider" class="w-full bg-zinc-900 border border-zinc-800 p-5 rounded-2xl text-2xl font-black text-white outline-none appearance-none pointer-events-none opacity-80"></select>
                <p class="text-[9px] text-zinc-600 mt-2 uppercase font-bold tracking-widest text-center">*Auto-queue: Based on alphabetical order</p>
            </div>

            <div class="text-center mb-8">
                <input type="number" id="scoreInput" min="0" max="10" step="0.1" value="0.0" class="bg-transparent text-9xl font-black text-white w-full text-center outline-none font-mono">
                <div class="flex justify-between text-[10px] font-black text-zinc-700 uppercase mt-4 px-2">
                    <span>Low</span>
                    <span>High Score (10.0)</span>
                </div>
                <input type="range" id="scoreRange" min="0" max="10" step="0.1" value="0.0" oninput="document.getElementById('scoreInput').value = this.value" class="w-full mt-2 h-2 bg-zinc-800 rounded-lg appearance-none cursor-pointer accent-white">
            </div>

            <button id="submitBtn" onclick="sendScore()" class="w-full bg-white text-black py-6 rounded-3xl font-black uppercase tracking-[0.2em] hover:bg-zinc-200 active:scale-95 transition-all shadow-xl shadow-white/10">
                Submit Run Score
            </button>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://ozvuclwfyehtuywioner.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im96dnVjbHdmeWVodHV5d2lvbmVyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY2OTE1MjcsImV4cCI6MjA5MjI2NzUyN30.H1t75CTSEXb5s_BnCRKEnWCyBM7sFVJeQVKJu4vPHww';
        const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let currentUser = null;
        let currentCategory = null;

        function login() {
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            const category = document.getElementById('categorySelect').value;

            const accounts = { 'juri1': 'skate01', 'juri2': 'skate02', 'juri3': 'skate03' };

            if (accounts[user] === pass) {
                currentUser = user;
                currentCategory = category;
                document.getElementById('loginSection').classList.add('hidden');
                document.getElementById('jurorPanel').classList.remove('hidden');
                document.getElementById('displayUser').innerText = "Judge: " + user;
                document.getElementById('displayCategory').innerText = category + " Category";
                loadAndSync();
            } else { alert("Login Salah!"); }
        }

        async function loadAndSync() {
            try {
                // 1. Ambil semua peserta di kategori terpilih
                const { data: riders } = await db.from('participants').select('*').eq('category', currentCategory);
                // Urutkan Abjad agar sama dengan Head Judge & Preview
                const alphabeticalRiders = riders.sort((a,b) => a.name.localeCompare(b.name));

                // 2. Ambil skor yang sudah diinput oleh JURI INI SAJA
                const { data: myScores } = await db.from('judges_scores')
                    .select('*')
                    .eq('judge_name', currentUser);

                // Mapping skor juri per peserta
                const scoreCounts = {};
                myScores.forEach(s => {
                    scoreCounts[s.participant_id] = (scoreCounts[s.participant_id] || 0) + 1;
                });

                // 3. Logika Round-Robin (Selesaikan Run 1 semua orang dulu)
                const allDoneRun1 = alphabeticalRiders.every(r => (scoreCounts[r.id] || 0) >= 1);
                const currentRunPhase = allDoneRun1 ? 2 : 1;

                // 4. Cari siapa yang "Next" (Urutan Abjad yang belum selesai Run Fase Ini)
                const nextSkater = alphabeticalRiders.find(r => (scoreCounts[r.id] || 0) < currentRunPhase);

                renderRiderSelect(alphabeticalRiders, nextSkater ? nextSkater.id : null);
                
                document.getElementById('runIndicator').innerText = nextSkater ? `PHASE: RUN ${currentRunPhase}` : `CATEGORY FINISHED`;
                if (!nextSkater) document.getElementById('submitBtn').disabled = true;

            } catch (e) { console.error(e); }
        }

        function renderRiderSelect(riders, nextId) {
            const select = document.getElementById('selectRider');
            select.innerHTML = riders.map(r => 
                `<option value="${r.id}" ${r.id == nextId ? 'selected' : ''}>${r.name.toUpperCase()}</option>`
            ).join('');
        }

        async function sendScore() {
            const riderId = document.getElementById('selectRider').value;
            const scoreValue = parseFloat(document.getElementById('scoreInput').value);
            const btn = document.getElementById('submitBtn');

            if (!riderId) return;

            btn.disabled = true; btn.innerText = "PUBLISHING...";

            try {
                const { error } = await db.from('judges_scores').insert([{
                    participant_id: riderId,
                    judge_name: currentUser,
                    score: scoreValue,
                    status: 'pending'
                }]);

                if (error) throw error;
                
                // Reset input dan reload antrean
                document.getElementById('scoreInput').value = "0.0";
                document.getElementById('scoreRange').value = "0.0";
                loadAndSync();
                alert("Score Sent!");

            } catch (e) { alert(e.message); }
            finally { btn.disabled = false; btn.innerText = "Submit Run Score"; }
        }

        // Realtime sync (Opsional jika juri lain input, juri ini juga terupdate listnya)
        db.channel('juri_sync').on('postgres_changes', { event: '*', schema: 'public', table: 'judges_scores' }, loadAndSync).subscribe();
    </script>
</body>
</html>
