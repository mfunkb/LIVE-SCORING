<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE FINALS - Skate Rank</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@900&display=swap');
        body { background: radial-gradient(circle at center, #1e1b4b 0%, #000 100%); color: white; font-family: 'Inter', sans-serif; min-height: 100vh; }
        .font-final { font-family: 'Orbitron', sans-serif; }
        .gold-border { border: 2px solid #fbbf24; box-shadow: 0 0 30px rgba(251, 191, 36, 0.2); background: rgba(251, 191, 36, 0.05); }
        .tab-active { border-bottom: 4px solid #fbbf24; color: #fbbf24; }
        .rank-item { transition: all 0.5s ease; }
    </style>
</head>
<body class="p-8">

    <div class="text-center mb-6">
        <h1 class="text-6xl font-black italic tracking-tighter font-final text-yellow-500 mb-2 uppercase">The Finals</h1>
        <div class="inline-block px-4 py-1 bg-yellow-500/20 rounded-full border border-yellow-500/50 mb-8">
            <p class="text-[10px] tracking-[0.5em] text-yellow-500 font-black uppercase">Live Final Ranking</p>
        </div>
    </div>

    <div class="max-w-4xl mx-auto flex justify-center gap-8 mb-10 border-b border-white/10 text-sm font-black tracking-widest">
        <button onclick="switchCategory('Beginner')" id="tabBeginner" class="pb-4 tab-active transition-all">BEGINNER</button>
        <button onclick="switchCategory('Open')" id="tabOpen" class="pb-4 text-slate-500 hover:text-white transition-all">OPEN</button>
        <button onclick="switchCategory('Grooms')" id="tabGrooms" class="pb-4 text-slate-500 hover:text-white transition-all">GROOMS</button>
    </div>

    <div class="max-w-4xl mx-auto space-y-4" id="finalList">
        </div>

    <script>
        const SUPABASE_URL = 'https://ozvuclwfyehtuywioner.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im96dnVjbHdmeWVodHV5d2lvbmVyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY2OTE1MjcsImV4cCI6MjA5MjI2NzUyN30.H1t75CTSEXb5s_BnCRKEnWCyBM7sFVJeQVKJu4vPHww';
        const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let currentCat = 'Beginner';

        function switchCategory(cat) {
            currentCat = cat;
            // Update UI Tab
            document.querySelectorAll('button[id^="tab"]').forEach(btn => {
                btn.classList.remove('tab-active');
                btn.classList.add('text-slate-500');
            });
            const activeTab = document.getElementById('tab' + cat);
            activeTab.classList.add('tab-active');
            activeTab.classList.remove('text-slate-500');
            
            fetchFinalData();
        }

        async function fetchFinalData() {
            // Kita ambil peserta yang: 1. Finalis, 2. Kategori yang dipilih
            const { data: finalists, error } = await db.from('participants')
                .select('*')
                .eq('is_finalist', true)
                .eq('category', currentCat)
                .order('final_score', { ascending: false });

            if (error) return console.error(error);

            const container = document.getElementById('finalList');
            
            if (!finalists || finalists.length === 0) {
                container.innerHTML = `
                    <div class="text-center py-20 opacity-30 italic font-bold">
                        BELUM ADA FINALIS DI KATEGORI ${currentCat.toUpperCase()}
                    </div>`;
                return;
            }

            container.innerHTML = finalists.map((r, i) => `
                <div class="rank-item ${i === 0 ? 'gold-border' : 'bg-slate-900/40'} p-8 rounded-3xl flex justify-between items-center border border-white/5 backdrop-blur-md">
                    <div class="flex items-center gap-8">
                        <span class="text-6xl font-black italic ${i === 0 ? 'text-yellow-500' : 'text-slate-800'}">#${i + 1}</span>
                        <div>
                            <h2 class="text-4xl font-black uppercase tracking-tighter text-white">${r.name}</h2>
                            <div class="flex gap-3 items-center mt-1">
                                <span class="text-[10px] bg-blue-600 px-2 py-0.5 rounded font-black italic text-white uppercase">${r.category}</span>
                                <p class="text-sm text-slate-500 font-bold tracking-widest">${r.city || 'INDONESIA'} • ${r.sponsor || 'PRIVATEER'}</p>
                            </div>
                        </div>
                    </div>

                    <div class="text-right">
                        <p class="text-[10px] font-bold text-slate-500 mb-1 uppercase tracking-widest">Best Final Run</p>
                        <p class="text-6xl font-black font-final ${i === 0 ? 'text-yellow-400' : 'text-green-400'}">
                            ${r.final_score ? r.final_score.toFixed(2) : '0.00'}
                        </p>
                    </div>
                </div>
            `).join('');
        }

        // Realtime Sync
        db.channel('final_live').on('postgres_changes', { event: '*', schema: 'public', table: 'participants' }, fetchFinalData).subscribe();
        
        document.addEventListener('DOMContentLoaded', fetchFinalData);
    </script>
</body>
</html>
