<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkateLiveRank - Integrated System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=JetBrains+Mono:wght@700&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #050505; color: #fff; }
        .glass-card { background: rgba(15, 15, 15, 0.8); border: 1px solid rgba(255,255,255,0.05); }
        .rank-gold { color: #fbbf24; }
        tr { border-bottom: 1px solid rgba(255,255,255,0.02); }
    </style>
</head>
<body class="p-4 lg:p-8 flex flex-col lg:flex-row gap-6 h-screen overflow-hidden">

    <div class="w-full lg:w-2/3 flex flex-col glass-card rounded-[3rem] overflow-hidden p-8 border border-white/5">
        <div class="flex justify-between items-center mb-10">
            <h1 class="text-4xl font-black italic tracking-tighter uppercase text-blue-500">SKATE<span class="text-white">LIVE</span>RANK</h1>
            <div class="flex gap-2">
                <button onclick="changeCat('Beginner')" id="btnBeginner" class="px-6 py-2 rounded-xl text-[10px] font-black bg-green-500 text-black transition-all">BEGINNER</button>
                <button onclick="changeCat('Open')" id="btnOpen" class="px-6 py-2 rounded-xl text-[10px] font-black bg-zinc-900 text-zinc-500 transition-all">OPEN</button>
                <button onclick="changeCat('Grooms')" id="btnGrooms" class="px-6 py-2 rounded-xl text-[10px] font-black bg-zinc-900 text-zinc-500 transition-all">GROOMS</button>
            </div>
        </div>

        <div class="overflow-y-auto flex-grow pr-2">
            <table class="w-full text-left">
                <thead class="text-zinc-600 text-[10px] font-black uppercase tracking-widest border-b border-white/5">
                    <tr>
                        <th class="py-4">Rank</th>
                        <th>Skater</th>
                        <th class="text-center">Run 1</th>
                        <th class="text-center">Run 2</th>
                        <th class="text-right">Best Score</th>
                    </tr>
                </thead>
                <tbody id="rankBody"></tbody>
            </table>
        </div>

        <div class="mt-6 bg-orange-600 p-6 rounded-[2rem] flex justify-between items-center shadow-[0_20px_50px_rgba(234,88,12,0.3)]">
            <div>
                <p class="text-[10px] font-black text-orange-200 uppercase tracking-widest" id="nextRunLabel">Up Next (Run 1)</p>
                <h2 class="text-5xl font-black italic uppercase tracking-tighter" id="nextSkaterName">-</h2>
            </div>
            <div class="text-7xl font-black text-orange-400/50 italic opacity-50">#NEXT</div>
        </div>
    </div>

    <div class="w-full lg:w-1/3 glass-card rounded-[3rem] p-8 border border-white/5 overflow-y-auto">
        <h3 class="text-zinc-500 font-black text-[10px] uppercase tracking-[0.3em] mb-6">Approval Center (Head Judge)</h3>
        
        <div id="approvalQueue" class="space-y-4">
            <p class="text-zinc-700 text-center font-bold py-10 uppercase text-xs tracking-widest">Waiting for juri input...</p>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://ozvuclwfyehtuywioner.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im96dnVjbHdmeWVodHV5d2lvbmVyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY2OTE1MjcsImV4cCI6MjA5MjI2NzUyN30.H1t75CTSEXb5s_BnCRKEnWCyBM7sFVJeQVKJu4vPHww';
        const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let activeCategory = 'Beginner';

        function changeCat(cat) {
            activeCategory = cat;
            document.querySelectorAll('button[id^="btn"]').forEach(b => {
                b.classList.replace('bg-green-500', 'bg-zinc-900');
                b.classList.replace('text-black', 'text-zinc-500');
            });
            const active = document.getElementById('btn' + cat);
            active.classList.replace('bg-zinc-900', 'bg-green-500');
            active.classList.replace('text-zinc-500', 'text-black');
            refreshAll();
        }

        async function refreshAll() {
            // 1. Load Riders & Scores
            const { data: riders } = await db.from('participants').select('*').eq('category', activeCategory);
            const { data: finalScores } = await db.from('scores').select('*');
            const { data: pendingScores } = await db.from('judges_scores').select('*, participants(name)').eq('status', 'pending');

            // 2. Process Leaderboard
            const mapped = riders.map(r => {
                const s = finalScores.filter(sc => sc.participant_id === r.id);
                const r1 = s[0]?.score || 0;
                const r2 = s[1]?.score || 0;
                return { ...r, r1, r2, best: Math.max(r1, r2) };
            }).sort((a,b) => b.best - a.best);

            renderTable(mapped);

            // 3. Round Robin Logic for "Up Next"
            const alphabetical = [...riders].sort((a,b) => a.name.localeCompare(b.name));
            const allDoneRun1 = alphabetical.every(r => finalScores.filter(s => s.participant_id === r.id).length >= 1);
            const currentRun = allDoneRun1 ? 2 : 1;
            const next = alphabetical.find(r => finalScores.filter(s => s.participant_id === r.id).length < currentRun);

            document.getElementById('nextSkaterName').innerText = next ? next.name : 'FINISHED';
            document.getElementById('nextRunLabel').innerText = `Up Next (Run ${currentRun})`;

            // 4. Render Approval Queue (Head Judge)
            renderApproval(pendingScores, finalScores);
        }

        function renderTable(data) {
            document.getElementById('rankBody').innerHTML = data.map((r, i) => `
                <tr class="hover:bg-white/5 transition-all">
                    <td class="py-6 font-mono text-xl ${i<3 ? 'text-orange-500' : 'text-zinc-600'}">#${i+1}</td>
                    <td class="text-2xl font-black italic uppercase">${r.name}</td>
                    <td class="text-center font-mono text-zinc-400">${r.r1 > 0 ? r.r1.toFixed(1) : '-'}</td>
                    <td class="text-center font-mono text-zinc-400">${r.r2 > 0 ? r.r2.toFixed(1) : '-'}</td>
                    <td class="text-right text-3xl font-black text-green-500 font-mono italic">${r.best.toFixed(2)}</td>
                </tr>
            `).join('');
        }

        function renderApproval(pending, final) {
            const groups = {};
            pending.forEach(s => {
                if (!groups[s.participant_id]) groups[s.participant_id] = { name: s.participants.name, j1: '-', j2: '-', j3: '-' };
                if (s.judge_name === 'juri1') groups[s.participant_id].j1 = s.score;
                if (s.judge_name === 'juri2') groups[s.participant_id].j2 = s.score;
                if (s.judge_name === 'juri3') groups[s.participant_id].j3 = s.score;
            });

            const container = document.getElementById('approvalQueue');
            const keys = Object.keys(groups);
            
            if (keys.length === 0) {
                container.innerHTML = `<p class="text-zinc-800 text-center py-10 font-black uppercase text-[10px]">No scores to confirm</p>`;
                return;
            }

            container.innerHTML = keys.map(pid => {
                const g = groups[pid];
                const scoresArr = [g.j1, g.j2, g.j3].filter(s => s !== '-');
                const avg = (scoresArr.reduce((a,b) => a+b, 0) / scoresArr.length).toFixed(2);
                const isReady = scoresArr.length === 3;

                return `
                    <div class="bg-zinc-900/50 border border-white/5 p-6 rounded-[2rem] space-y-4">
                        <div class="flex justify-between items-center">
                            <h4 class="font-black italic uppercase text-lg">${g.name}</h4>
                            <span class="text-[10px] font-bold text-zinc-600">${scoresArr.length}/3 JURI</span>
                        </div>
                        <div class="flex gap-2">
                            <div class="flex-1 bg-black p-3 rounded-xl text-center border border-white/5"><p class="text-[8px] text-zinc-600 mb-1">J1</p><p class="font-bold">${g.j1}</p></div>
                            <div class="flex-1 bg-black p-3 rounded-xl text-center border border-white/5"><p class="text-[8px] text-zinc-600 mb-1">J2</p><p class="font-bold">${g.j2}</p></div>
                            <div class="flex-1 bg-black p-3 rounded-xl text-center border border-white/5"><p class="text-[8px] text-zinc-600 mb-1">J3</p><p class="font-bold">${g.j3}</p></div>
                        </div>
                        <button onclick="approveScore(${pid}, ${avg})" 
                            ${!isReady ? 'disabled' : ''}
                            class="w-full ${isReady ? 'bg-white text-black' : 'bg-zinc-800 text-zinc-600'} py-3 rounded-xl font-black uppercase text-[10px] tracking-widest">
                            Approve ${avg}
                        </button>
                    </div>
                `;
            }).join('');
        }

        async function approveScore(pid, avg) {
            try {
                // KIRIM HANYA ID & SCORE (Tanpa judge_name)
                await db.from('scores').insert([{ participant_id: pid, score: avg }]);
                await db.from('judges_scores').update({ status: 'approved' }).eq('participant_id', pid).eq('status', 'pending');
                refreshAll();
            } catch (e) { alert(err.message); }
        }

        // REALTIME SYNC
        db.channel('any').on('postgres_changes', { event: '*', schema: 'public' }, refreshAll).subscribe();
        refreshAll();
    </script>
</body>
</html>
